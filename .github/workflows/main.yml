name: CI/CD Production Build

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Prepare Project
      run: |
        if ls *.zip >/dev/null 2>&1; then
          unzip -q "*.zip" -d temp_project
          cp -r temp_project/* .
          rm -rf temp_project
        fi

    - name: Setup Node and Java 21
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build and Sync
      run: |
        npm install --legacy-peer-deps
        npm run build
        npm install @capacitor/cli @capacitor/core @capacitor/android --save-dev
        echo '{"appId": "com.jam.pro", "appName": "JAM-Pro", "webDir": "dist"}' > capacitor.config.json
        rm -rf android
        npx cap add android
        npx cap sync android

    - name: Build Android App
      run: |
        # ضبط بيئة العمل للتعامل مع Java 21
        export JAVA_HOME=$JAVA_HOME_21_X64
        
        sed -i 's/<application/<application android:hardwareAccelerated="true" android:largeHeap="true"/' android/app/src/main/AndroidManifest.xml
        echo "configurations.all { exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'; exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8' }" >> android/app/build.gradle
        
        cd android
        chmod +x gradlew
        # تشغيل البناء مع إضافة خيار لتقليل الصرامة في التحقق من إصدار الجافا
        ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: JAM-Pro-Debug-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk
