name: CI/CD Production APK Build (Keep Local Assets)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Unzip and Move Project Files (Preserve Android Folder)
      run: |
        mkdir -p temp_project
        unzip -q "*.zip" -d temp_project
        PROJECT_DIR=$(find temp_project -maxdepth 3 -name "package.json" -exec dirname {} \;)
        # نسخ المشروع بالكامل بما فيه مجلد أندرويد الجاهز الخاص بك لضمان عدم ضياع الأيقونات والأسماء
        cp -r $PROJECT_DIR/* .
        rm -rf temp_project

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install and Build Web Assets
      run: |
        npm install --legacy-peer-deps
        npm run build

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Direct Build from Existing Android Directory
      run: |
        # 1. منع حذف مجلد أندرويد وعمل مزامنة فقط لحقن تحديثات الـ Web داخل مشروعك الجاهز
        npx cap sync android
        
        # 2. منح الصلاحيات لملف الجرادل المرفوع في مشروعك وبناء الـ APK بدون توقيع
        cd android
        chmod +x gradlew
        ./gradlew assembleRelease --no-daemon

    - name: Upload Unsigned APK with Your Custom Icons
      uses: actions/upload-artifact@v4
      with:
        name: JAM-System-Pro-Ready-APK
        path: android/app/build/outputs/apk/release/*-unsigned.apk
