name: CI/CD Production Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Unzip and Move Project Files
      run: |
        mkdir -p temp_project
        unzip -q "*.zip" -d temp_project
        PROJECT_DIR=$(find temp_project -maxdepth 3 -name "package.json" -exec dirname {} \;)
        # حفظ مسار مجلد الأيقونات الخاص بك قبل المسح
        cp -r $PROJECT_DIR/android/app/src/main/res/mipmap-* ./saved_icons 2>/dev/null || echo "No icons found"
        cp -r $PROJECT_DIR/* .
        rm -rf temp_project

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install and Build Web Assets
      run: |
        npm install --legacy-peer-deps
        npm run build

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build Android App
      run: |
        # 1. حذف المجلد التالف وإعادة إنشائه بواسطة Capacitor
        rm -rf android
        npx cap add android
        
        # 2. استعادة أيقوناتك الأصلية إلى مجلد الأندرويد الجديد
        if [ -d "saved_icons" ]; then
          cp -r saved_icons/* android/app/src/main/res/
        fi
        
        # 3. المزامنة
        npx cap sync android
        
        # 4. بناء التطبيق
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: JAM-Pro-Debug-APK
        path: android/app/build/outputs/apk/debug/*.apk
